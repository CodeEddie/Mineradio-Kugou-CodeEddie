<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mineradio Wallpaper</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050608}
    canvas{position:absolute;inset:0;width:100%;height:100%}
  </style>
</head>
<body>
  <canvas id="wall"></canvas>
  <script>
    'use strict';
    var canvas = document.getElementById('wall');
    var ctx = canvas.getContext('2d', { alpha:false });
    var W = 1, H = 1, dpr = 1;
    var state = {
      enabled:false,title:'Mineradio',artist:'',cover:'',playing:false,preset:0,template:'aurora',opacity:1,
      colors:{primary:'#d6f8ff',secondary:'#9cffdf',highlight:'#fff0b8',glow:'#9cffdf'}
    };
    var coverImg = null, coverSrc = '';
    var particles = [];
    function hexToRgb(hex, fallback){
      hex = String(hex || fallback || '#9cffdf').trim();
      if (/^#[0-9a-f]{3}$/i.test(hex)) hex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
      if (!/^#[0-9a-f]{6}$/i.test(hex)) hex = fallback || '#9cffdf';
      return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
    }
    function rgba(hex, a){
      var c = hexToRgb(hex);
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + a + ')';
    }
    function rand(seed){ return Math.abs(Math.sin(seed * 3187.917) * 43758.5453) % 1; }
    function ensureParticles(){
      var target = Math.min(760, Math.max(420, Math.round((innerWidth * innerHeight) / 4200)));
      while (particles.length < target) {
        var i = particles.length + 1;
        particles.push({ seed:i * 11.37, x:rand(i), y:rand(i * 2.7), lane:rand(i * 5.9), z:rand(i * 8.1), size:.6 + rand(i * 4.2) * 2.4 });
      }
      if (particles.length > target + 80) particles.length = target;
    }
    function resize(){
      dpr = Math.min(1.35, Math.max(1, window.devicePixelRatio || 1));
      W = Math.max(1, Math.floor(innerWidth * dpr));
      H = Math.max(1, Math.floor(innerHeight * dpr));
      canvas.width = W; canvas.height = H;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ensureParticles();
    }
    function setCover(src){
      src = String(src || '');
      if (src === coverSrc) return;
      coverSrc = src;
      coverImg = null;
      if (!src) return;
      var img = new Image();
      img.onload = function(){ if (coverSrc === src) coverImg = img; };
      img.onerror = function(){ if (coverSrc === src) coverImg = null; };
      img.src = src;
    }
    function applyState(next){
      state = Object.assign({}, state, next || {});
      state.colors = Object.assign({}, state.colors, next && next.colors || {});
      if (!/^(aurora|halo|vinyl|constellation)$/.test(state.template || '')) state.template = 'aurora';
      setCover(state.cover || '');
    }
    function drawCover(now){
      if (!coverImg) return;
      var side = Math.min(innerWidth, innerHeight) * (.42 + Math.sin(now * .21) * .012);
      var x = innerWidth * .5 - side * .5;
      var y = innerHeight * .50 - side * .5 + Math.sin(now * .37) * 8;
      ctx.save();
      ctx.globalAlpha = .16 * (state.opacity || 1);
      ctx.filter = 'blur(28px) saturate(1.25)';
      ctx.drawImage(coverImg, x - side * .12, y - side * .12, side * 1.24, side * 1.24);
      ctx.filter = 'none';
      ctx.globalAlpha = .20 * (state.opacity || 1);
      ctx.drawImage(coverImg, x, y, side, side);
      ctx.restore();
    }
    function particlePosition(p, now, speedScale){
      var speed = (.009 + rand(p.seed) * .021 + (state.playing ? .010 : 0)) * (speedScale || 1);
      var a = (p.x * Math.PI * 2 + now * speed + Math.sin(now * .07 + p.seed) * .14) % (Math.PI * 2);
      var ring = .18 + p.z * .82;
      return {
        x:innerWidth * .5 + Math.cos(a) * innerWidth * .40 * ring + Math.sin(now * .11 + p.seed) * 24,
        y:innerHeight * .5 + Math.sin(now * .28) * innerHeight * .018 + Math.sin(a * (1.0 + rand(p.seed * 2) * .16)) * innerHeight * .30 * ring + Math.sin(now * (.22 + rand(p.seed) * .18) + p.seed) * 12,
        tw:Math.pow(.5 + .5 * Math.sin(now * (.50 + rand(p.seed)*.42) + p.seed), 4)
      };
    }
    function drawAurora(now, opacity, colors){
      drawCover(now);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (var i=0;i<particles.length;i++) {
        var p = particles[i], pos = particlePosition(p, now, 1);
        var r = Math.max(.7, p.size * (.8 + pos.tw * 1.2));
        ctx.globalAlpha = (0.045 + pos.tw * .18 + (state.playing ? .035 : 0)) * opacity;
        ctx.fillStyle = pos.tw > .74 ? colors.highlight : (p.lane > .55 ? colors.secondary : colors.glow);
        ctx.beginPath(); ctx.arc(pos.x,pos.y,r,0,Math.PI*2); ctx.fill();
      }
      ctx.restore();
    }
    function drawHalo(now, opacity, colors){
      drawCover(now);
      var cx=innerWidth*.5, cy=innerHeight*.48, base=Math.min(innerWidth,innerHeight)*.24;
      ctx.save();
      ctx.translate(cx,cy);
      ctx.globalCompositeOperation='lighter';
      for(var i=0;i<6;i++){
        var pulse=1+Math.sin(now*(.18+i*.025)+i)*.025;
        ctx.beginPath();
        ctx.ellipse(0,0,base*pulse*(1+i*.16),base*pulse*(.72+i*.085),now*.018+i*.14,0,Math.PI*2);
        ctx.strokeStyle=i%2?rgba(colors.secondary,.09*opacity):rgba(colors.highlight,.12*opacity);
        ctx.lineWidth=i===0?3:1;
        ctx.stroke();
      }
      var glow=ctx.createRadialGradient(0,0,base*.12,0,0,base*2.1);
      glow.addColorStop(0,rgba(colors.highlight,.17*opacity));
      glow.addColorStop(.38,rgba(colors.glow,.07*opacity));
      glow.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=glow;ctx.fillRect(-base*2.2,-base*2.2,base*4.4,base*4.4);
      ctx.restore();
    }
    function drawVinyl(now, opacity, colors){
      var cx=innerWidth*.5,cy=innerHeight*.5,r=Math.min(innerWidth,innerHeight)*.31;
      ctx.save();ctx.translate(cx,cy);ctx.rotate(now*(state.playing?.035:.012));
      var disc=ctx.createRadialGradient(0,0,r*.04,0,0,r);
      disc.addColorStop(0,rgba(colors.highlight,.24*opacity));disc.addColorStop(.18,'#14171c');disc.addColorStop(1,'#020304');
      ctx.fillStyle=disc;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.055)';ctx.lineWidth=1;
      for(var i=3;i<34;i++){ctx.beginPath();ctx.arc(0,0,r*(i/36),0,Math.PI*2);ctx.stroke();}
      if(coverImg){var s=r*.58;ctx.save();ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.clip();ctx.globalAlpha=.76*opacity;ctx.drawImage(coverImg,-s,-s,s*2,s*2);ctx.restore();}
      ctx.fillStyle=rgba(colors.highlight,.72*opacity);ctx.beginPath();ctx.arc(0,0,r*.035,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
    function drawConstellation(now, opacity, colors){
      ctx.save();ctx.globalCompositeOperation='lighter';
      var nodes=[];
      for(var i=0;i<Math.min(150,particles.length);i++){
        var p=particles[i],pos=particlePosition(p,now,.34);nodes.push(pos);
        ctx.globalAlpha=(.10+pos.tw*.28)*opacity;ctx.fillStyle=i%4?colors.secondary:colors.highlight;
        ctx.beginPath();ctx.arc(pos.x,pos.y,.7+pos.tw*1.5,0,Math.PI*2);ctx.fill();
      }
      ctx.lineWidth=.65;
      for(var j=0;j<nodes.length-1;j++){
        var a=nodes[j],b=nodes[(j+17)%nodes.length],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<innerWidth*.16){ctx.globalAlpha=(1-d/(innerWidth*.16))*.10*opacity;ctx.strokeStyle=colors.glow;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}
      }
      ctx.restore();
    }
    function draw(nowMs){
      var now = nowMs * .001;
      ensureParticles();
      var opacity = Math.max(.35, Math.min(1, state.opacity || 1));
      var primary = state.colors.primary || '#d6f8ff';
      var secondary = state.colors.secondary || '#9cffdf';
      var highlight = state.colors.highlight || '#fff0b8';
      var glow = state.colors.glow || secondary;
      var bg = ctx.createLinearGradient(0,0,innerWidth,innerHeight);
      bg.addColorStop(0, '#050608');
      bg.addColorStop(.52, rgba(primary, .045 * opacity));
      bg.addColorStop(1, rgba(secondary, .035 * opacity));
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#050608';
      ctx.fillRect(0,0,innerWidth,innerHeight);
      ctx.fillStyle = bg;
      ctx.fillRect(0,0,innerWidth,innerHeight);
      var cx = innerWidth * .5;
      var cy = innerHeight * .5 + Math.sin(now * .28) * innerHeight * .018;
      var colors={primary:primary,secondary:secondary,highlight:highlight,glow:glow};
      if(state.template==='halo') drawHalo(now,opacity,colors);
      else if(state.template==='vinyl') drawVinyl(now,opacity,colors);
      else if(state.template==='constellation') drawConstellation(now,opacity,colors);
      else drawAurora(now,opacity,colors);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var aura = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(innerWidth,innerHeight)*.54);
      aura.addColorStop(0, rgba(highlight, .038 * opacity));
      aura.addColorStop(.34, rgba(secondary, .026 * opacity));
      aura.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.globalAlpha = .64;
      ctx.fillStyle = aura;
      ctx.fillRect(0,0,innerWidth,innerHeight);
      ctx.restore();
      requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resize);
    resize();
    if (window.desktopOverlay && window.desktopOverlay.onWallpaperState) {
      window.desktopOverlay.onWallpaperState(applyState);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
